<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="作品相本詳情頁，展示作品介紹、資訊與相片集。" />
    <title>作品相本 | 張詠淇｜設計作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260527-2" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="index.html#top" aria-label="回到首頁">
        <span class="brand-mark"></span>
        張詠淇｜設計作品集
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" id="site-nav">
        <a href="index.html#works">作品</a>
        <a href="index.html#about">關於我</a>
        <a href="services.html">接案合作</a>
        <a href="index.html#contact">聯絡我</a>
      </nav>
    </header>

    <main class="album-page">
      <section class="album-hero section">
        <a class="back-link" href="index.html#works">← 回作品列表</a>
        <div class="album-hero-grid">
          <div>
            <p class="eyebrow" data-album-category>Portfolio Album</p>
            <h1 data-album-title>作品相本</h1>
            <p class="hero-copy" data-album-description>
              這裡會顯示作品的介紹、年份、服務項目與照片集。
            </p>
          </div>
          <dl class="album-meta">
            <div>
              <dt>Year</dt>
              <dd data-album-year>2026</dd>
            </div>
            <div>
              <dt>Type</dt>
              <dd data-album-type>Portfolio</dd>
            </div>
            <div>
              <dt>Scope</dt>
              <dd data-album-scope>Visual Direction</dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="album-gallery section" aria-label="相本照片">
        <div class="gallery-grid" data-gallery-grid></div>
      </section>

      <div class="lightbox" data-lightbox aria-hidden="true">
        <button class="lightbox-close" type="button" data-lightbox-close aria-label="關閉大圖">
          ×
        </button>
        <div class="lightbox-image" data-lightbox-image role="img"></div>
        <p class="lightbox-caption" data-lightbox-caption></p>
      </div>

      <section class="album-next section">
        <p class="eyebrow">Next</p>
        <h2>繼續瀏覽其他作品</h2>
        <a class="button primary" href="index.html#works">回作品展示</a>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 張詠淇｜設計作品集. All rights reserved.</p>
      <a href="index.html#top">Back to top</a>
    </footer>

    <script src="script.js?v=20260527-2"></script>
  </body>
</html>
